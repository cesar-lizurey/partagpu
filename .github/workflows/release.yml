name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build helper
        run: cargo build -p partagpu-helper --release --manifest-path src-tauri/helper/Cargo.toml

      - name: Copy helper to resources
        run: cp src-tauri/target/release/partagpu-helper src-tauri/resources/partagpu-helper

      - name: Build .deb and .AppImage
        run: npx tauri build --bundles deb appimage

      - name: Gather artifacts
        id: artifacts
        run: |
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "deb_name=$(basename "$DEB")" >> "$GITHUB_OUTPUT"
          echo "appimage=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "appimage_name=$(basename "$APPIMAGE")" >> "$GITHUB_OUTPUT"
          ls -lh "$DEB" "$APPIMAGE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PartaGPU ${{ github.ref_name }}"
          body: |
            ## PartaGPU ${{ github.ref_name }}

            ### Installation

            **Option A : .deb (Ubuntu/Debian)**
            ```bash
            sudo dpkg -i partagpu_*.deb
            ```

            **Option B : AppImage (toute distribution)**
            ```bash
            chmod +x PartaGPU-*.AppImage
            ./PartaGPU-*.AppImage
            ```

            Voir le [README](https://github.com/cesar-lizurey/partagpu#readme) pour la documentation complète.
          files: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.appimage }}
          draft: false
          prerelease: false
