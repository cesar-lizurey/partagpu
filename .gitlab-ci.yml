stages:
  - check
  - audit
  - build
  - release

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  NODE_OPTIONS: "--max-old-space-size=4096"

# ── Cache ──────────────────────────────────────────────────

.cache_rust: &cache_rust
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/registry
      - .cargo/git
      - src-tauri/target

.cache_node: &cache_node
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules

# ── Check stage ────────────────────────────────────────────

typecheck:
  stage: check
  image: node:22
  <<: *cache_node
  script:
    - npm ci
    - npx tsc --noEmit
    - npm run format:check

lint:
  stage: check
  image: node:22
  <<: *cache_node
  script:
    - npm ci
    - npm run lint
  allow_failure: true

rust-check:
  stage: check
  image: rust:1.83
  <<: *cache_rust
  before_script:
    - apt-get update -qq && apt-get install -y -qq
        libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev patchelf > /dev/null 2>&1
  script:
    - cd src-tauri && cargo check --workspace

# ── Audit stage ────────────────────────────────────────────

npm-audit:
  stage: audit
  image: node:22
  <<: *cache_node
  script:
    - npm ci
    - npm audit --audit-level=high
  allow_failure: true

cargo-audit:
  stage: audit
  image: rust:1.83
  <<: *cache_rust
  script:
    - cargo install cargo-audit --locked 2>/dev/null || true
    - cd src-tauri && cargo audit
  allow_failure: true

# ── Build stage ────────────────────────────────────────────

build-deb:
  stage: build
  image: rust:1.83
  <<: *cache_rust
  before_script:
    - apt-get update -qq && apt-get install -y -qq
        libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
        librsvg2-dev patchelf
        curl > /dev/null 2>&1
    # Install Node.js
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - > /dev/null 2>&1
    - apt-get install -y -qq nodejs > /dev/null 2>&1
    # Install Tauri CLI
    - npm ci
    # Install cargo-tauri
    - cargo install tauri-cli --locked 2>/dev/null || true
  script:
    # Build the helper
    - cargo build -p partagpu-helper --release --manifest-path src-tauri/helper/Cargo.toml
    # Copy helper to resources so it gets bundled in the .deb
    - cp src-tauri/target/release/partagpu-helper src-tauri/resources/partagpu-helper
    # Build the .deb
    - npx tauri build --bundles deb
    # Find and display the .deb
    - DEB_PATH=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
    - echo "Built .deb at ${DEB_PATH}"
    - ls -lh "$DEB_PATH"
  artifacts:
    paths:
      - src-tauri/target/release/bundle/deb/*.deb
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Release stage ──────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-deb
      artifacts: true
  script:
    - DEB_FILE=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
    - DEB_NAME=$(basename "$DEB_FILE")
    - echo "Releasing ${DEB_NAME} as ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "PartaGPU $CI_COMMIT_TAG"
    description: |
      ## PartaGPU $CI_COMMIT_TAG

      ### Installation

      1. Téléchargez le fichier `.deb` ci-dessous
      2. Installez-le : `sudo dpkg -i partagpu_*.deb`
      3. Lancez PartaGPU depuis le menu d'applications

      Voir le [README](README.md) pour la documentation complète.
    assets:
      links:
        - name: "partagpu_${CI_COMMIT_TAG}_amd64.deb"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/src-tauri/target/release/bundle/deb/partagpu_${CI_COMMIT_TAG}_amd64.deb"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
