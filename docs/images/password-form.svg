<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150" font-family="Inter, system-ui, sans-serif">
  <rect width="560" height="150" rx="10" fill="#222632"/>

  <!-- Status line -->
  <circle cx="24" cy="28" r="6" fill="#f59e0b"/>
  <text x="40" y="32" fill="#e4e6eb" font-size="13">Utilisateur partagpu existe mais n'a pas de mot de passe.</text>

  <!-- Hint -->
  <text x="24" y="62" fill="#8b8fa3" font-size="12">Définir le mot de passe pour se connecter à cette machine :</text>

  <!-- Input: Mot de passe -->
  <rect x="24" y="78" width="180" height="36" rx="8" fill="#0f1117" stroke="#2a2e3a" stroke-width="1"/>
  <text x="36" y="101" fill="#8b8fa3" font-size="12">Mot de passe</text>

  <!-- Input: Confirmer -->
  <rect x="216" y="78" width="180" height="36" rx="8" fill="#0f1117" stroke="#2a2e3a" stroke-width="1"/>
  <text x="228" y="101" fill="#8b8fa3" font-size="12">Confirmer</text>

  <!-- Button -->
  <rect x="408" y="78" width="100" height="36" rx="8" fill="#6366f1"/>
  <text x="458" y="101" text-anchor="middle" fill="white" font-size="13" font-weight="600">Définir</text>

  <!-- Bottom border -->
  <line x1="24" y1="130" x2="536" y2="130" stroke="#2a2e3a" stroke-width="0.5"/>
</svg>
