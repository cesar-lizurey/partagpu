<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <filter id="ash">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="640" height="280" rx="16" fill="url(#abg)"/>
  <text x="320" y="30" text-anchor="middle" fill="#e4e6eb" font-size="15" font-weight="600">Durcissement du compte partagpu</text>

  <!-- Account box -->
  <rect x="30" y="50" width="260" height="210" rx="10" fill="#222632" stroke="#f59e0b" stroke-width="1.5" filter="url(#ash)"/>
  <text x="160" y="75" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">Compte partagpu</text>

  <!-- Properties -->
  <text x="50" y="105" fill="#22c55e" font-size="12">Shell restreint</text>
  <text x="50" y="123" fill="#8b8fa3" font-size="10">Ne lance que PartaGPU, rien d'autre</text>

  <text x="50" y="150" fill="#22c55e" font-size="12">Home verrouillé (700)</text>
  <text x="50" y="168" fill="#8b8fa3" font-size="10">Inaccessible aux autres utilisateurs</text>

  <text x="50" y="195" fill="#22c55e" font-size="12">Mot de passe expire (90j)</text>
  <text x="50" y="213" fill="#8b8fa3" font-size="10">Rotation forcée via chage</text>

  <text x="50" y="240" fill="#22c55e" font-size="12">stdin uniquement</text>
  <text x="50" y="255" fill="#8b8fa3" font-size="10">Mot de passe jamais dans /proc</text>

  <!-- Blocked accesses -->
  <rect x="350" y="50" width="260" height="210" rx="10" fill="#222632" stroke="#ef4444" stroke-width="1.5" filter="url(#ash)"/>
  <text x="480" y="75" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="600">Accès bloqués</text>

  <!-- SSH -->
  <rect x="370" y="92" width="220" height="36" rx="6" fill="rgba(239,68,68,0.08)"/>
  <text x="390" y="108" fill="#ef4444" font-size="12" font-weight="500">SSH</text>
  <text x="390" y="123" fill="#8b8fa3" font-size="10">DenyUsers dans sshd_config.d/</text>

  <!-- sudo -->
  <rect x="370" y="138" width="220" height="36" rx="6" fill="rgba(239,68,68,0.08)"/>
  <text x="390" y="154" fill="#ef4444" font-size="12" font-weight="500">sudo</text>
  <text x="390" y="169" fill="#8b8fa3" font-size="10">!ALL dans sudoers.d/</text>

  <!-- su -c -->
  <rect x="370" y="184" width="220" height="36" rx="6" fill="rgba(239,68,68,0.08)"/>
  <text x="390" y="200" fill="#ef4444" font-size="12" font-weight="500">su -c "commande"</text>
  <text x="390" y="215" fill="#8b8fa3" font-size="10">Rejeté par le shell restreint</text>

  <!-- Terminal -->
  <rect x="370" y="230" width="220" height="26" rx="6" fill="rgba(239,68,68,0.08)"/>
  <text x="390" y="248" fill="#ef4444" font-size="12" font-weight="500">Terminal interactif — impossible</text>
</svg>
