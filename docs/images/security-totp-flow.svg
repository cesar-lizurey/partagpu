<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <filter id="tsh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="tarr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="xarr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="720" height="300" rx="16" fill="url(#tbg)"/>
  <text x="360" y="28" text-anchor="middle" fill="#e4e6eb" font-size="15" font-weight="600">Vérification des pairs par TOTP</text>

  <!-- Shared secret -->
  <rect x="260" y="48" width="200" height="36" rx="8" fill="#222632" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="71" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="500">Secret partagé (4 mots)</text>

  <!-- Arrow down left -->
  <line x1="310" y1="84" x2="150" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tarr)"/>
  <!-- Arrow down right -->
  <line x1="410" y1="84" x2="570" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tarr)"/>

  <!-- Machine A -->
  <rect x="40" y="120" width="220" height="60" rx="8" fill="#222632" stroke="#22c55e" stroke-width="1.5" filter="url(#tsh)"/>
  <text x="150" y="145" text-anchor="middle" fill="#e4e6eb" font-size="12" font-weight="600">PC-César</text>
  <text x="150" y="165" text-anchor="middle" fill="#22c55e" font-size="11">Génère le code : 847 291</text>

  <!-- Machine B -->
  <rect x="460" y="120" width="220" height="60" rx="8" fill="#222632" stroke="#22c55e" stroke-width="1.5" filter="url(#tsh)"/>
  <text x="570" y="145" text-anchor="middle" fill="#e4e6eb" font-size="12" font-weight="600">PC-Corinne</text>
  <text x="570" y="165" text-anchor="middle" fill="#22c55e" font-size="11">Génère le code : 847 291</text>

  <!-- mDNS exchange -->
  <line x1="260" y1="150" x2="460" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tarr)"/>
  <text x="360" y="143" text-anchor="middle" fill="#6366f1" font-size="10">mDNS : « mon code est 847291 »</text>

  <!-- Verified -->
  <line x1="150" y1="180" x2="150" y2="220" stroke="#8b8fa3" stroke-width="1.5" marker-end="url(#tarr)"/>
  <line x1="570" y1="180" x2="570" y2="220" stroke="#8b8fa3" stroke-width="1.5" marker-end="url(#tarr)"/>

  <rect x="80" y="220" width="140" height="30" rx="6" fill="rgba(34,197,94,0.15)"/>
  <text x="150" y="240" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">OK — vérifié</text>

  <rect x="500" y="220" width="140" height="30" rx="6" fill="rgba(34,197,94,0.15)"/>
  <text x="570" y="240" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">OK — vérifié</text>

  <!-- Attacker -->
  <rect x="270" y="210" width="180" height="60" rx="8" fill="#222632" stroke="#ef4444" stroke-width="1.5" filter="url(#tsh)"/>
  <text x="360" y="235" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">Attaquant</text>
  <text x="360" y="255" text-anchor="middle" fill="#8b8fa3" font-size="10">Code : 123 456 (faux)</text>

  <!-- Reject -->
  <line x1="360" y1="270" x2="360" y2="290" stroke="#ef4444" stroke-width="1.5" marker-end="url(#xarr)"/>
  <text x="360" y="298" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="500">? — rejeté, tâches bloquées</text>
</svg>
