<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 240" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <filter id="msh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="650" height="240" rx="16" fill="url(#mbg)"/>
  <text x="325" y="28" text-anchor="middle" fill="#e4e6eb" font-size="15" font-weight="600">Protection contre le mDNS spoofing / flood</text>

  <!-- Protection 1: max peers -->
  <rect x="20" y="50" width="190" height="80" rx="8" fill="#222632" stroke="#6366f1" stroke-width="1.5" filter="url(#msh)"/>
  <text x="115" y="75" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="600">Max 50 pairs</text>
  <text x="115" y="95" text-anchor="middle" fill="#8b8fa3" font-size="10">Au-delà, les nouveaux</text>
  <text x="115" y="110" text-anchor="middle" fill="#8b8fa3" font-size="10">pairs sont ignorés</text>

  <!-- Protection 2: rate limit -->
  <rect x="230" y="50" width="190" height="80" rx="8" fill="#222632" stroke="#f59e0b" stroke-width="1.5" filter="url(#msh)"/>
  <text x="325" y="75" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">Rate limit (2s)</text>
  <text x="325" y="95" text-anchor="middle" fill="#8b8fa3" font-size="10">Mises à jour trop rapides</text>
  <text x="325" y="110" text-anchor="middle" fill="#8b8fa3" font-size="10">silencieusement ignorées</text>

  <!-- Protection 3: hostname conflict -->
  <rect x="440" y="50" width="190" height="80" rx="8" fill="#222632" stroke="#ef4444" stroke-width="1.5" filter="url(#msh)"/>
  <text x="535" y="75" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">Conflit hostname</text>
  <text x="535" y="95" text-anchor="middle" fill="#8b8fa3" font-size="10">2 IPs pour le même nom</text>
  <text x="535" y="110" text-anchor="middle" fill="#ef4444" font-size="10">= alerte usurpation</text>

  <!-- Scenario -->
  <rect x="20" y="150" width="610" height="70" rx="8" fill="#222632" filter="url(#msh)"/>
  <text x="325" y="175" text-anchor="middle" fill="#e4e6eb" font-size="12" font-weight="500">Scénario d'attaque : un attaquant envoie 1000 fausses annonces mDNS</text>
  <text x="325" y="200" text-anchor="middle" fill="#22c55e" font-size="11">Les 50 premiers pairs sont acceptés. Le reste est ignoré. Les rafales sont filtrées. Les conflits sont signalés.</text>
</svg>
