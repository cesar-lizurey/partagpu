<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222632"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="10" fill="url(#bg2)"/>

  <!-- Legend -->
  <rect x="20" y="16" width="12" height="12" fill="#6366f1"/>
  <text x="38" y="27" fill="#e4e6eb" font-size="12">Corinne (2 tâches)</text>
  <rect x="190" y="16" width="12" height="12" fill="#f59e0b"/>
  <text x="208" y="27" fill="#e4e6eb" font-size="12">Emmanuel (1 tâche)</text>
  <rect x="370" y="16" width="12" height="12" fill="#22c55e"/>
  <text x="388" y="27" fill="#e4e6eb" font-size="12">Mika (3 tâches)</text>

  <!-- CPU row -->
  <text x="20" y="65" fill="#8b8fa3" font-size="12" font-weight="600">CPU</text>
  <rect x="55" y="52" width="440" height="18" fill="#2a2e3a"/>
  <rect x="55" y="52" width="110" height="18" fill="#6366f1"/>
  <rect x="165" y="52" width="55" height="18" fill="#f59e0b"/>
  <rect x="220" y="52" width="22" height="18" fill="#22c55e"/>
  <text x="510" y="65" fill="#8b8fa3" font-size="11">42% / 100%</text>

  <!-- RAM row -->
  <text x="20" y="105" fill="#8b8fa3" font-size="12" font-weight="600">RAM</text>
  <rect x="55" y="92" width="440" height="18" fill="#2a2e3a"/>
  <rect x="55" y="92" width="70" height="18" fill="#6366f1"/>
  <rect x="125" y="92" width="50" height="18" fill="#f59e0b"/>
  <rect x="175" y="92" width="18" height="18" fill="#22c55e"/>
  <text x="510" y="105" fill="#8b8fa3" font-size="11">3.8 Go / 16 Go</text>

  <!-- GPU row -->
  <text x="20" y="145" fill="#8b8fa3" font-size="12" font-weight="600">GPU</text>
  <rect x="55" y="132" width="440" height="18" fill="#2a2e3a"/>
  <rect x="55" y="132" width="44" height="18" fill="#6366f1"/>
  <rect x="99" y="132" width="40" height="18" fill="#f59e0b"/>
  <text x="510" y="145" fill="#8b8fa3" font-size="11">28% / 100%</text>

  <!-- Footer -->
  <text x="300" y="180" text-anchor="middle" fill="#8b8fa3" font-size="11" font-style="italic">Survolez un segment pour voir le détail par utilisateur</text>
</svg>
